  <div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">
    <button class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center"
            id="bd-theme"
            type="button"
            aria-expanded="false"
            data-bs-toggle="dropdown"
            aria-label="Toggle theme (auto)">
      <svg class="bi my-1 theme-icon-active" width="1em" height="1em"><use href="#circle-half"></use></svg>
      <span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="bd-theme-text">
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light" aria-pressed="false">
          <svg class="bi me-2 opacity-50" width="1em" height="1em"><use href="#sun-fill"></use></svg>
          Light
          <svg class="bi ms-auto d-none" width="1em" height="1em"><use href="#check2"></use></svg>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark" aria-pressed="false">
          <svg class="bi me-2 opacity-50" width="1em" height="1em"><use href="#moon-stars-fill"></use></svg>
          Dark
          <svg class="bi ms-auto d-none" width="1em" height="1em"><use href="#check2"></use></svg>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center active" data-bs-theme-value="auto" aria-pressed="true">
          <svg class="bi me-2 opacity-50" width="1em" height="1em"><use href="#circle-half"></use></svg>
          Auto
          <svg class="bi ms-auto d-none" width="1em" height="1em"><use href="#check2"></use></svg>
        </button>
      </li>
    </ul>

<!-- MAIN -->
<main>

  <div class="container px-4 py-4">
    <div id="alertPlaceholder"></div>

    <div class="row row-cols-2 align-items-md-center g-5 mb-2 border-bottom">
      <div class="col">
          <h2 class="pb-2">Settings</h2>
      </div>
    </div>

    <div class="row">
      <div class="col-3 p-3 text-bg">
        <div class="list-group">
          <div class="list-group-item list-group-item-action">
            <div class="d-flex w-100 justify-content-between">
              <a class="bi-card-list nav-link primary" aria-current="page" id="games_list_link" style="cursor: pointer;">
                <svg class="bi pe-none" width="16" height="16"></svg>
                Games list
              </a>
            </div>
          </div>
          <div class="list-group-item list-group-item-action">
              <div class="d-flex w-100 justify-content-between">
                <a class="bi-cloud-plus nav-link primary" aria-current="page" onclick="openUploadModal()" style="cursor: pointer;">
                  <svg class="bi pe-none" width="16" height="16"></svg>
                  Upload new
                </a>
              </div>
          </div>
        </div>

      </div>
      <div class="col-9" id="content_div">

      </div>
    </div>
  </div>
</main>
<!-- MAIN -->

<div w3-include-html="/settings/upload.html"></div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit game</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="/api/update" id="editForm" method="post" class="needs-validation" novalidate>
        <input type="hidden" id="editInputId" name="id">
        <input type="hidden" id="editInputIgdbId" name="igdb_id">
        <div class="modal-body">
          <div class="mb-3">
            <label for="editInputName" class="form-label">Name</label>
            <input type="text" class="form-control" id="editInputName" name="name" required>
            <div class="invalid-feedback">
              Please add a game name.
            </div>
          </div>
          <div class="mb-3">
            <label for="editInputImageUrl" class="form-label">Cover URL</label>
            <input type="text" class="form-control" id="editInputImageUrl" name="img">
          </div>
          <div class="mb-3">
            <label for="editTextareaDescription" class="form-label">Description</label>
            <textarea class="form-control" id="editTextareaDescription" rows="3" name="description"></textarea>
          </div>
          <div class="mb-3">
            <label for="editTextareaDevelopers" class="form-label">Developers</label>
            <textarea class="form-control" id="editTextareaDevelopers" rows="2" name="developers"></textarea>
          </div>
          <div class="mb-3">
            <label for="editTextareaPublishers" class="form-label">Publishers</label>
            <textarea class="form-control" id="editTextareaPublishers" rows="2" name="publishers"></textarea>
          </div>
          <div class="mb-3">
            <label for="editTextareaGenres" class="form-label">Genres</label>
            <textarea class="form-control" id="editTextareaGenres" rows="2" name="genres"></textarea>
          </div>
          <div class="mb-3">
            <label for="editInputYear" class="form-label">Release</label>
            <input type="text" class="form-control" id="editInputYear" name="year">
          </div>
          <div class="mb-3">
            <label for="editInputTrailerUrl" class="form-label">Trailer URL</label>
            <input type="text" class="form-control" id="editInputTrailerUrl" name="trailer">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-primary" id="edit_modal_save">Save changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal" id="confirmDeleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this record?</p>
      </div>
      <div class="modal-footer">
        <input type="hidden" id="gameIdDelete">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
        <button type="button" class="btn btn-primary" id="confirmDeleteButton">Yes</button>
      </div>
    </div>
  </div>
</div>
